# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/todosdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password

# JPA and Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable data.sql initial seeding for MySQL to avoid duplicate key exceptions on restarts
spring.sql.init.mode=never
